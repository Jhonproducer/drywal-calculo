<div class="container">
    <h1>Calculadora de Despiece Drywall</h1>
    <p>Ingresa los metros lineales (ML) obtenidos de SketchUp.</p>

    <table id="tablaMateriales">
        <thead>
            <tr>
                <th>Material (Nombre)</th>
                <th>ML Totales (SketchUp)</th>
                <th>Largo Perfil (m)</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            </tbody>
    </table>

    <div class="actions">
        <button class="btn-add" onclick="agregarFila()">+ Agregar Material</button>
        <button class="btn-calc" onclick="procesarCalculo()">Generar Lista de Compra</button>
    </div>

    <div id="resultadoFinal" class="resultado-card"></div>
</div>
